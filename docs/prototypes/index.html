<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 记账 App - 高保真原型预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        .iphone-frame {
            width: 393px;
            height: 852px;
            border-radius: 3rem; /* 48px */
            border: 12px solid #1e293b;
            box-shadow: 
                0 0 0 2px #334155,
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 0 0 1px rgba(0, 0, 0, 0.1);
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .iphone-frame:hover {
            transform: translateY(-10px);
            box-shadow: 
                0 0 0 2px #475569,
                0 30px 60px -10px rgba(0, 0, 0, 0.6),
                inset 0 0 0 1px rgba(0, 0, 0, 0.1);
        }

        /* Dynamic Island Mock */
        .dynamic-island {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background-color: #000;
            border-radius: 20px;
            z-index: 999;
        }

        /* Home Indicator Mock */
        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background-color: #1e293b;
            border-radius: 10px;
            z-index: 999;
            opacity: 0.3;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 2.5rem; /* slightly less than frame to fit inside */
            background-color: transparent;
        }
    </style>
</head>
<body class="min-h-screen text-slate-200 py-12 px-8 overflow-x-auto">

    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h1 class="text-4xl font-bold text-white mb-4 tracking-tight">AI 记账 App 原型预览</h1>
            <p class="text-slate-400 text-lg">基于需求文档设计的高保真 HTML 原型展示画板</p>
            <div class="mt-4 flex justify-center space-x-4">
                <span class="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 px-3 py-1 rounded-full text-sm">Tailwind CSS</span>
                <span class="bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 px-3 py-1 rounded-full text-sm">iPhone 15 Pro 尺寸</span>
            </div>
        </div>

        <div class="flex flex-wrap justify-center gap-12 pb-20">
            
            <!-- Auth Stack -->
            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">登录页</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="login.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">注册页</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="register.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <!-- Main Tab -->
            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">首页 (明细)</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="home.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">账单编辑 Modal</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="editModal.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">AI 对话</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="chat.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">我 (个人中心)</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="profile.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">修改用户名 Modal</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="editUsernameModal.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

            <div class="flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-6 text-slate-300">修改密码 Modal</h2>
                <div class="iphone-frame">
                    <div class="dynamic-island"></div>
                    <iframe src="editPasswordModal.html"></iframe>
                    <div class="home-indicator"></div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
