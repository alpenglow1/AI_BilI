<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>修改用户名</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: { primary: '#6366f1', expense: '#f43f5e', income: '#10b981' }
                }
            }
        }
    </script>
    <style>body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }</style>
</head>
<body class="w-full h-screen overflow-hidden flex flex-col relative bg-slate-900/40">

    <!-- Bottom Sheet -->
    <div class="absolute inset-x-0 bottom-0 bg-white rounded-t-3xl flex flex-col shadow-2xl">
        <!-- Header -->
        <div class="px-5 py-4 flex justify-between items-center border-b border-slate-100">
            <button onclick="window.history.back()" class="text-slate-400 hover:text-slate-600 p-2 -ml-2">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <h2 class="font-bold text-slate-800 text-lg">修改用户名</h2>
            <div class="w-8"></div> <!-- placeholder for balance -->
        </div>

        <!-- Form Content -->
        <div class="px-5 py-6 space-y-4">
            
            <div>
                <p class="text-slate-500 text-xs mb-2 ml-1">新用户名</p>
                <div class="flex items-center bg-slate-50 rounded-2xl p-4 border border-slate-100">
                    <input type="text" value="Jerri" class="w-full bg-transparent border-none focus:outline-none text-slate-800 font-medium" />
                    <button class="text-slate-300 hover:text-slate-400"><i class="fa-solid fa-circle-xmark"></i></button>
                </div>
                <p class="text-slate-400 text-[10px] mt-2 ml-2">* 长度限制 2-20 个字符</p>
            </div>

            <div class="pt-4 pb-8">
                <button onclick="window.history.back()" class="w-full bg-primary text-white font-medium py-4 rounded-2xl shadow-sm hover:bg-primary/90 transition-colors">
                    <i class="fa-solid fa-floppy-disk mr-2"></i>保存修改
                </button>
            </div>
        </div>
    </div>
</body>
</html>
